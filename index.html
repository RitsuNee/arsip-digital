<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Web Ardi</title>
    
    <meta name="description" content="Ardi was here">
    
    <style>
        /* CSS reset dasar untuk fullscreen layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll ganda di halaman utama */
            background-color: #f3f4f6;
        }
        
        .app-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* Pengaturan Iframe untuk menyembunyikan banner atas Google Script */
        iframe {
            position: absolute;
            top: -40px; /* Menarik frame ke atas sebesar tinggi banner Google */
            left: 0;
            width: 100%;
            height: calc(100% + 40px); /* Menambah tinggi untuk menutupi tarikan ke atas */
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- PENTING: Ganti URL di bawah ini dengan URL Web App (akhiran /exec) milik Anda setelah di-deploy -->
        <iframe src="https://script.google.com/macros/s/AKfycbywI-inU2FAUMCkzcZba-gv6jZJ_r1LA-CcX9eeHks9v3tPCM5ebxervPwdTeXL0V8G/exec" title="Test Web" allowfullscreen></iframe>
    </div>

</body>
</html>
