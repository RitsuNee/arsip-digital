<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Web Ardi</title>
    
    <meta name="description" content="Ardi was here">
    
    <style>
        /* CSS reset dasar untuk fullscreen layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Mencegah scroll ganda di halaman utama */
            background-color: #f3f4f6;
        }
        
        .app-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* Pengaturan Iframe untuk menyembunyikan banner atas Google Script */
        iframe {
            position: absolute;
            /* Menarik frame ke atas. Banner peringatan Google biasanya persis 36px */
            top: -36px; 
            left: 0;
            width: 100%;
            height: calc(100% + 36px);
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- PENTING: Ganti URL di bawah ini dengan URL Web App milik Anda -->
        <iframe src="https://script.google.com/macros/s/AKfycbzvYWF-zaPT2J6jF5SCOYy31iaRQ82FYKhGzXqo-Aikyahle9yNwIJs6CECiLkJXyC__Q/exec" allowfullscreen></iframe>
    </div>

</body>
</html>
